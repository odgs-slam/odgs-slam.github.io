<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ODGS-SLAM</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin: 0;
      padding: 2.25rem 1rem 0;
      text-align: center;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      line-height: 1.25;
    }

    header {
      text-align: center;
    }

    main {
      min-height: auto;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 3rem 2rem 2rem;
    }

    p {
      margin: 0;
      font-size: 1.3rem;
      color: #555;
    }

    .authors {
      margin: 0.5rem 0 0;
      font-size: 1.5rem;
      color: #444;
    }

    .affiliation {
      margin: 0.25rem 0 0;
      font-size: 1.3rem;
      color: #555;
    }

    .system-overview {
      max-width: 1654px;
      width: 100%;
      height: auto;
      margin: 2rem auto 0;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ODGS-SLAM: Omnidirectional Gaussian Splatting SLAM</h1>
    <p class="authors">Stefan Spiss, Joey Hieronimy, Marcel Ritter, Matthias Harders</p>
    <p class="affiliation">University of Innsbruck</p>
    <img src="data/system-overview.webp" alt="ODGS-SLAM System Overview" class="system-overview" />
  </header>
  <main>
    <p>Paper, source code and dataset are coming soon.</p>
  </main>

</html>
